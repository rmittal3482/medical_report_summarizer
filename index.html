<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Report Summarizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #e0eafc, #cfdef3, #eef1f5, #c3cfe2);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center; padding: 2rem;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .main-container {
            max-width: 700px; width: 100%;
            background: rgba(255, 255, 255, 0.75); border-radius: 20px;
            box-shadow: 0 10px 40px 0 rgba(31, 38, 135, 0.2);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2); padding: 3rem 3.5rem;
        }
        .header-title { font-weight: 700; font-size: 2.25rem; color: #1a253c; margin-bottom: 0.75rem; }
        .header-lead { font-size: 1.15rem; color: #4a5568; margin-bottom: 2.5rem; }
        .file-upload-wrapper {
            position: relative; border: 2px dashed #adb5bd; border-radius: 12px;
            padding: 2.5rem; text-align: center; cursor: pointer;
            background-color: rgba(248, 249, 250, 0.7); transition: all 0.3s ease; margin-bottom: 2rem;
        }
        .file-upload-wrapper:hover {
            background-color: rgba(230, 242, 255, 0.9); border-color: #0d6efd;
            transform: translateY(-3px);
        }
        .file-upload-wrapper input[type="file"] { position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .file-upload-icon { font-size: 3rem; color: #0d6efd; margin-bottom: 1rem; display: inline-block; }
        .file-upload-filename { font-weight: 600; color: #0b5ed7; margin-top: 0.75rem; display: block; }
        .summarize-btn { padding: 0.9rem 1.75rem; font-weight: 600; font-size: 1.1rem; border-radius: 12px; transition: all 0.3s ease; margin-top: 1rem; }
        .summarize-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 7px 20px -2px rgba(13, 110, 253, 0.45); }
        #results { background: #ffffff; border-radius: 16px; padding: 2.5rem; box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08); margin-top: 2.5rem; opacity: 0; transform: translateY(10px); transition: opacity 0.5s ease-out, transform 0.5s ease-out; }
        #results.visible { opacity: 1; transform: translateY(0); }
        .summary-card { background-color: #f8f9fa; border: 1px solid #dee2e6; border-radius: 12px; padding: 1.75rem; margin-top: 1.5rem; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="text-center mb-5">
            <h1 class="header-title">Medical Report Summarizer</h1>
            <p class="header-lead">Upload your report to get a simple, plain-language summary.</p>
        </div>
        <form id="upload-form">
            <div class="mb-4">
                <label for="pdf-file" class="file-upload-wrapper">
                    <input type="file" id="pdf-file" accept=".pdf" required>
                    <div class="file-upload-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" class="bi bi-cloud-arrow-up-fill" viewBox="0 0 16 16">
                          <path d="M8 2a5.53 5.53 0 0 0-3.594 1.342c-.766.66-1.321 1.52-1.464 2.383C1.266 6.095 0 7.555 0 9.318 0 11.366 1.708 13 3.781 13h8.906C14.502 13 16 11.57 16 9.773c0-1.636-1.242-2.969-2.834-3.194C12.923 3.999 10.69 2 8 2m2.354 5.146a.5.5 0 0 1-.708.708L8.5 6.707V10.5a.5.5 0 0 1-1 0V6.707L6.354 7.854a.5.5 0 1 1-.708-.708l2-2a.5.5 0 0 1 .708 0z"/>
                        </svg>
                    </div>
                    <div class="file-upload-text">Click to browse or drag & drop a PDF<span class="file-upload-filename" id="file-name-display">No file selected</span></div>
                </label>
            </div>
            <div class="mb-4">
                <label for="lang-select" class="form-label">Select Summary Language</label>
                <select id="lang-select" class="form-select form-select-lg">
                    <option value="en" selected>English</option>
                    <option value="hi">Hindi (हिन्दी)</option>
                    <option value="bn">Bengali (বাংলা)</option>
                    <option value="pa">Punjabi (ਪੰਜਾਬੀ)</option>
                    <option value="mr">Marathi (मराठी)</option>
                    <option value="gu">Gujarati (ગુજરાતી)</option>
                    <option value="ta">Tamil (தமிழ்)</option>
                    <option value="te">Telugu (తెలుగు)</option>
                    <option value="kn">Kannada (ಕನ್ನಡ)</option>
                    <option value="ml">Malayalam (മലയാളം)</option>
                    <option value="ur">Urdu (اردو)</option>
                    <option value="or">Odia (ଓଡ଼ିଆ)</option>
                    <option value="as">Assamese (অসমীয়া)</option>
                </select>
            </div>
            <button type="submit" id="summarize-btn" class="btn btn-primary btn-lg w-100 summarize-btn"><span id="btn-text">Summarize Report</span><span id="spinner" class="spinner-border spinner-border-sm" role="status" aria-hidden="true" style="display: none;"></span></button>
        </form>
        <div id="results" class="mt-4" style="display: none;"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
